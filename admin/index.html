<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#1A1A1A">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin — Perros de la Isla</title>
    <link rel="stylesheet" href="./styles.css?v=10">
</head>
<body>

    <section class="screen" id="screen-loading" aria-busy="true">
        <main class="centered">
            <div class="logo"><img src="../img/logo.png" alt="" class="logo-img"><span class="logo-text">PDLI</span></div>
            <p class="muted">Cargando…</p>
        </main>
    </section>

    <section class="screen" id="screen-login" hidden>
        <header class="header header--solo">
            <div class="logo"><img src="../img/logo.png" alt="" class="logo-img"><span class="logo-text">PDLI</span></div>
        </header>
        <main class="centered">
            <h1 class="title-display">Admin</h1>
            <form id="login-form" class="form" novalidate>
                <label class="field">
                    <span>Email</span>
                    <input type="email" id="login-email" autocomplete="email" required>
                </label>
                <label class="field">
                    <span>Contraseña</span>
                    <input type="password" id="login-password" autocomplete="current-password" required>
                </label>
                <button type="submit" class="btn btn-primary" id="login-submit">Entrar</button>
                <p class="error-message" id="login-error" hidden></p>
            </form>
        </main>
    </section>

    <section class="screen admin-spa" id="screen-app" hidden>

        <nav class="admin-nav" aria-label="Navegación principal">
            <div class="admin-nav-brand">
                <img src="../img/logo.png" alt="PDLI" class="admin-nav-logo">
                <span class="admin-nav-name" id="home-admin-name"></span>
            </div>

            <div class="admin-nav-tabs">
                <button class="admin-tab" data-tab="inicio" type="button">
                    <span class="admin-tab-icon" aria-hidden="true">🏠</span>
                    <span class="admin-tab-label">Inicio</span>
                </button>
                <button class="admin-tab" data-tab="agenda" type="button">
                    <span class="admin-tab-icon" aria-hidden="true">📅</span>
                    <span class="admin-tab-label">Agenda</span>
                </button>
                <button class="admin-tab" data-tab="clientes" type="button">
                    <span class="admin-tab-icon" aria-hidden="true">👥</span>
                    <span class="admin-tab-label">Clientes</span>
                </button>
                <button class="admin-tab" data-tab="stats" type="button">
                    <span class="admin-tab-icon" aria-hidden="true">📊</span>
                    <span class="admin-tab-label">Stats</span>
                </button>
                <button class="admin-tab" data-tab="catalogo" type="button">
                    <span class="admin-tab-icon" aria-hidden="true">📚</span>
                    <span class="admin-tab-label">Catálogo</span>
                </button>
            </div>

            <button class="admin-nav-logout" id="logout-btn" type="button">Cerrar sesión</button>
        </nav>

        <main class="admin-main">

            <section class="admin-panel" data-panel="inicio" hidden>
                <h1 class="admin-panel-title">Inicio</h1>
                <p class="admin-panel-subtitle">KPIs y próximas citas — Bloque 5</p>
            </section>

            <section class="admin-panel" data-panel="agenda" hidden>
                <h1 class="admin-panel-title">Agenda</h1>
                <p class="admin-panel-subtitle">Plantilla, bloqueos y citas — Bloque 3</p>
            </section>

            <section class="admin-panel" data-panel="clientes" hidden>
                <div class="search-wrapper">
                    <input type="search" id="cliente-search" placeholder="Buscar por nombre o teléfono" autocomplete="off">
                </div>
                <div class="chips" role="tablist" id="estado-filtros">
                    <button type="button" class="chip is-active" data-filter="todos" role="tab" aria-selected="true">Todos</button>
                    <button type="button" class="chip" data-filter="consulta" role="tab" aria-selected="false">Consultas</button>
                    <button type="button" class="chip" data-filter="activo" role="tab" aria-selected="false">Activos</button>
                    <button type="button" class="chip" data-filter="mantenimiento" role="tab" aria-selected="false">Mantenimiento</button>
                    <button type="button" class="chip" data-filter="inactivo" role="tab" aria-selected="false">Inactivos</button>
                </div>
                <div id="clientes-feedback" class="feedback" hidden></div>
                <ul id="clientes-lista" class="clientes-lista" aria-live="polite"></ul>
            </section>

            <section class="admin-panel" data-panel="stats" hidden>
                <h1 class="admin-panel-title">Estadísticas</h1>
                <p class="admin-panel-subtitle">KPIs y gráficos — Bloque 4</p>
            </section>

            <section class="admin-panel" data-panel="catalogo" hidden>
                <h1 class="admin-panel-title">Catálogo</h1>
                <p class="admin-panel-subtitle">Editor de ejercicios — Bloque 5</p>
            </section>

        </main>

    </section>

    <script type="module" src="./admin.js?v=10"></script>
</body>
</html>
